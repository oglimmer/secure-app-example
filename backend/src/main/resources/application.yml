server:
  port: 8080

spring:
  application:
    name: secure-vault
  datasource:
    # In-memory H2 — data lives only for the lifetime of the process (prototype).
    url: jdbc:h2:mem:vault;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

# Where the Vue dev server runs — used for CORS.
app:
  cors:
    allowed-origin: http://localhost:5173

logging:
  level:
    org.hibernate.SQL: warn
